<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PROJECTS — PHISHERS OF MEN</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syne:wght@700;800&family=Fragment+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: rgba(255,255,255,0.06);
      --amber: #00ff00;
      --slate: #8b95a1;
      --text: #cdd5df;
      --f-head: 'Syne', sans-serif;
      --f-body: 'Space Grotesk', sans-serif;
      --f-mono: 'Fragment Mono', monospace;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--f-body);
      line-height: 1.6;
      min-width: 320px;
      overflow-x: hidden;
      background-image: repeating-linear-gradient(
        0deg,
        transparent, transparent 2px,
        rgba(255,255,255,0.005) 2px, rgba(255,255,255,0.005) 4px
      );
    }

    ::selection { background: rgba(0,255,0,0.28); color: #fff; }

    /* ── HEADER ── */
    header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 1rem 2rem;
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      z-index: 10;
      transition: background 0.25s ease, border-color 0.25s ease, padding 0.25s ease;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1100px;
      margin: auto;
    }

    .logo {
      font-family: var(--f-head);
      color: var(--amber);
      text-decoration: none;
      font-weight: 800;
      letter-spacing: 2px;
    }

    nav ul { display: flex; gap: 1.25rem; list-style: none; }
    nav a { color: var(--slate); text-decoration: none; font-size: .8rem; }
    nav a:hover { color: var(--amber); }

    header.is-scrolled {
      background: rgba(13,17,23,0.72);
      border-color: rgba(0,255,0,0.18);
      padding: 0.72rem 2rem;
    }

    /* ── PROJECTS PAGE ── */
    .projects-main {
      position: relative;
      z-index: 1;
    }

    .projects-hero {
      min-height: 82vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 7rem 2rem 3rem;
    }

    .projects-eyebrow,
    .project-meta,
    .project-number,
    .project-links a {
      font-family: var(--f-mono);
      letter-spacing: 2px;
    }

    .projects-eyebrow {
      color: var(--amber);
      font-size: 0.68rem;
    }

    .projects-hero h1 {
      font-family: var(--f-head);
      color: var(--amber);
      font-size: clamp(3.5rem, 10vw, 8rem);
      line-height: 0.95;
      margin: 0.9rem 0;
    }

    .projects-hero p {
      color: var(--slate);
      max-width: 540px;
      margin: auto;
    }

    .projects-track {
      max-width: 980px;
      margin: 0 auto;
      padding: 0 2rem 8rem;
      display: grid;
      gap: 32vh;
    }

    .project-panel {
      min-height: 64vh;
      display: grid;
      grid-template-columns: 0.28fr 1fr;
      align-items: center;
      gap: 2rem;
      border-top: 1px solid var(--border);
      position: relative;
    }

    .project-panel::after {
      content: "";
      position: absolute;
      left: 0;
      top: -1px;
      width: 0;
      height: 1px;
      background: var(--amber);
      transition: width 0.4s ease;
    }

    .project-panel:hover::after {
      width: 100%;
    }

    .project-number {
      color: rgba(0,255,0,0.34);
      font-size: clamp(3rem, 12vw, 8rem);
      line-height: 1;
      transform: translateY(var(--panel-shift, 0));
    }

    .project-copy {
      transform: translateY(calc(var(--panel-shift, 0) * -0.35));
    }

    .project-meta {
      display: flex;
      gap: 1rem;
      color: var(--slate);
      font-size: 0.62rem;
      text-transform: uppercase;
    }

    .project-copy h2 {
      font-family: var(--f-head);
      color: var(--text);
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1;
      margin: 0.55rem 0 1rem;
    }

    .project-summary {
      color: var(--amber);
      font-size: 1.02rem;
      max-width: 720px;
    }

    .project-body {
      color: var(--slate);
      max-width: 700px;
      margin-top: 1rem;
    }

    .project-links {
      display: flex;
      gap: 1rem;
      margin-top: 1.6rem;
    }

    .project-links a {
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.7rem 0.95rem;
      font-size: 0.64rem;
      transition: border-color 0.2s ease, color 0.2s ease;
    }

    .project-links a:hover {
      color: var(--amber);
      border-color: rgba(0,255,0,0.42);
    }

    @media (max-width: 760px) {
      header { padding: 0.85rem 1rem; }
      header.is-scrolled { padding: 0.7rem 1rem; }
      nav { align-items: flex-start; gap: 0.8rem; flex-wrap: wrap; }
      .logo { font-size: 0.75rem; letter-spacing: 1px; max-width: 10rem; line-height: 1.2; }
      nav ul { gap: 0.7rem; flex-wrap: wrap; justify-content: flex-end; flex: 1; }
      nav a { font-size: 0.68rem; }

      .projects-hero {
        min-height: 68vh;
        text-align: left;
        justify-content: flex-start;
        align-items: flex-end;
        padding: 7rem 1rem 3rem;
      }

      .projects-track {
        padding: 0 1rem 5rem;
        gap: 18vh;
      }

      .project-panel {
        min-height: auto;
        grid-template-columns: 1fr;
        gap: 0.5rem;
        padding-top: 2rem;
      }

      .project-number { font-size: 3rem; }

      .project-links { flex-direction: column; }
    }
  </style>
</head>
<body>

  <header id="site-header">
    <nav>
      <a href="index.html" class="logo">PHISHERS_OF_MEN</a>
      <ul>
        <li><a href="index.html">HOME</a></li>
        <li><a href="projects.html">PROJECTS</a></li>
        <li><a href="terminal.html">TERMINAL</a></li>
	<li><a href="index.html#team">TEAM</a></li>
        <li><a href="index.html#contact">CONTACT</a></li>
      </ul>
    </nav>
  </header>

  <main class="projects-main">
    <section class="projects-hero">
      <div>
        <h1>PROJECTS</h1>
      </div>
    </section>

    <section class="projects-track" aria-label="Project list" id="projects-track"></section>
  </main>

  <script>
    /* ================================================================
       PROJECTS DATA
       To add a project, paste a new object into this array.
       Fields map directly to the markdown frontmatter + body:
         title   — frontmatter: title
         year    — frontmatter: year
         status  — frontmatter: status
         site    — frontmatter: site   (WEBSITE link)
         repo    — frontmatter: repo   (REPO link)
         summary — frontmatter: summary
         body    — markdown body (first non-empty line is shown)
       Projects are displayed in the order listed here.
    ================================================================ */
    const projects = [
      {
        title:   "YellowFin",
        year:    "2026",
        status:  "Development",
        repo:    "https://github.com/sifi11/yellowfin",
        summary: "Malware package with many different modules.",
        body:    "Yellowfin is an open source package of malware modules that include a reverse shell, clipboard history reader, screen capture, and more useful modules.",
      },
      // Add more projects here, e.g.:
      // {
      //   title:   "Project Name",
      //   year:    "2025",
      //   status:  "Complete",
      //   site:    "https://example.com",
      //   repo:    "https://github.com/yourrepo",
      //   summary: "One-line summary.",
      //   body:    "Longer description shown beneath the summary.",
      // },
    ];

    /* ── Render project panels ── */
    const track = document.getElementById('projects-track');
    projects.forEach((project, index) => {
      const num    = String(index + 1).padStart(2, '0');
      const body1  = project.body.split('\n').filter(Boolean)[0] ?? '';
      const article = document.createElement('article');
      article.className = 'project-panel';
      article.dataset.projectPanel = '';
      article.dataset.index = index;
      article.innerHTML = `
        <div class="project-number">${num}</div>
        <div class="project-copy">
          <div class="project-meta">
            <span>${project.year}</span>
            <span>${project.status}</span>
          </div>
          <h2>${project.title}</h2>
          <p class="project-summary">${project.summary}</p>
          <p class="project-body">${body1}</p>
          <div class="project-links">
            <a href="${project.repo}" target="_blank" rel="noopener noreferrer">REPO</a>
          </div>
        </div>`;
      track.appendChild(article);
    });

    /* ── Header scroll ── */
    const hdr = document.getElementById('site-header');
    window.addEventListener('scroll', () => hdr?.classList.toggle('is-scrolled', window.scrollY > 16), { passive: true });

    /* ── Parallax panels ── */
    function updateParallax() {
      const panels = document.querySelectorAll('[data-project-panel]');
      const center = window.innerHeight * 0.5;
      panels.forEach((panel) => {
        const rect = panel.getBoundingClientRect();
        const distance = (rect.top + rect.height * 0.5 - center) / window.innerHeight;
        const shift = Math.max(-42, Math.min(42, distance * -56));
        panel.style.setProperty('--panel-shift', `${shift}px`);
      });
    }

    updateParallax();
    window.addEventListener('scroll', updateParallax, { passive: true });
    window.addEventListener('resize', updateParallax, { passive: true });
  </script>
</body>
</html>
