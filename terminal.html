<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TERMINAL</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syne:wght@700;800&family=Fragment+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: rgba(255,255,255,0.06);
      --amber: #00ff00;
      --slate: #8b95a1;
      --text: #cdd5df;
      --f-head: 'Syne', sans-serif;
      --f-body: 'Space Grotesk', sans-serif;
      --f-mono: 'Fragment Mono', monospace;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--f-body);
      line-height: 1.6;
      min-width: 320px;
      overflow-x: hidden;
      background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.005) 2px, rgba(255,255,255,0.005) 4px);
    }

    ::selection { background: rgba(0,255,0,0.28); color: #fff; }

    /* HEADER */
    header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 1rem 2rem;
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      z-index: 10;
      transition: background 0.25s ease, border-color 0.25s ease, padding 0.25s ease;
    }
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1100px;
      margin: auto;
    }
    .logo {
      font-family: var(--f-head);
      color: var(--amber);
      text-decoration: none;
      font-weight: 800;
      letter-spacing: 2px;
    }
    nav ul { display: flex; gap: 1.25rem; list-style: none; }
    nav a { color: var(--slate); text-decoration: none; font-size: .8rem; }
    nav a:hover { color: var(--amber); }
    header.is-scrolled {
      background: rgba(13,17,23,0.72);
      border-color: rgba(0,255,0,0.18);
      padding: 0.72rem 2rem;
    }

    /* TERMINAL PAGE */
    .terminal-main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 5.5rem 1rem 2rem;
    }

    /* Floating window shell */
    .terminal-shell {
      position: relative;
      width: min(860px, calc(100vw - 2rem));
      height: min(560px, calc(100vh - 8.5rem));
      min-width: 320px;
      min-height: 240px;
      background: rgba(9,13,18,0.82);
      backdrop-filter: blur(18px) saturate(1.3);
      -webkit-backdrop-filter: blur(18px) saturate(1.3);
      border: 1px solid rgba(205,213,223,0.18);
      border-radius: 9px;
      display: grid;
      grid-template-rows: 34px minmax(0, 1fr);
      overflow: hidden;
      box-shadow:
        0 8px 16px rgba(0,0,0,0.28),
        0 28px 72px rgba(0,0,0,0.52),
        inset 0 0 0 1px rgba(255,255,255,0.04);
      user-select: none;
    }

    /* Title bar */
    .terminal-titlebar {
      display: flex;
      align-items: center;
      gap: 0.48rem;
      padding: 0 0.85rem;
      background: linear-gradient(180deg, rgba(26,32,40,0.95), rgba(18,24,32,0.95));
      border-bottom: 1px solid rgba(255,255,255,0.08);
      color: #8b95a1;
      font-family: var(--f-mono);
      font-size: 0.68rem;
      flex-shrink: 0;
    }

    .terminal-dot {
      width: 0.62rem;
      height: 0.62rem;
      border-radius: 50%;
      background: #59616d;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.12);
      flex-shrink: 0;
    }
    .terminal-dot:nth-child(1) { background: #a94e41; }
    .terminal-dot:nth-child(2) { background: #b88537; }
    .terminal-dot:nth-child(3) { background: #59795a; }

    .terminal-title { margin-left: 0.35rem; }

    /* Screen area */
    .terminal-screen {
      min-height: 0;
      overflow: auto;
      padding: 0.8rem 0.9rem 1rem;
      background:
        radial-gradient(circle at 35% -10%, rgba(0,255,0,0.055), transparent 36%),
        linear-gradient(180deg, rgba(255,255,255,0.018), transparent 18%),
        rgba(6,9,13,0.78);
      scrollbar-color: rgba(0,255,0,0.45) rgba(255,255,255,0.04);
    }

    .terminal-output {
      font-family: var(--f-mono);
      font-size: 0.8rem;
      line-height: 1.55;
      white-space: pre-wrap;
      color: #cdd5df;
    }

    .terminal-input-row {
      display: flex;
      gap: 0.55rem;
      align-items: center;
      padding: 0;
      font-family: var(--f-mono);
      color: #cdd5df;
      font-size: 0.8rem;
      letter-spacing: 0;
    }

    .term-command, .terminal-prompt { color: #00ff00; }
    .term-muted { color: #8b95a1; }

    #terminal-input {
      flex: 1;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: #cdd5df;
      font: inherit;
      caret-color: #00ff00;
    }

    /* ── HAMBURGER NAV (mobile) ── */
    .hamburger{display:none;flex-direction:column;justify-content:center;gap:5px;width:32px;height:32px;background:none;border:none;cursor:pointer;padding:4px;z-index:200;}
    .hamburger span{display:block;width:100%;height:2px;background:var(--amber);border-radius:2px;transition:transform 0.28s ease,opacity 0.28s ease;transform-origin:center;}
    .hamburger[aria-expanded="true"] span:nth-child(1){transform:translateY(7px) rotate(45deg);}
    .hamburger[aria-expanded="true"] span:nth-child(2){opacity:0;transform:scaleX(0);}
    .hamburger[aria-expanded="true"] span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
    .nav-menu{display:flex;gap:1.25rem;list-style:none;}

    @media (max-width: 760px) {
      header { padding: 0.85rem 1rem; }
      header.is-scrolled { padding: 0.7rem 1rem; }
      .hamburger{display:flex;}
      .nav-menu{display:none;flex-direction:column;position:fixed;top:0;right:0;width:220px;height:100vh;background:rgba(13,17,23,0.97);border-left:1px solid rgba(0,255,0,0.18);padding:5rem 1.5rem 2rem;gap:0;z-index:100;backdrop-filter:blur(14px);}
      .nav-menu.is-open{display:flex;}
      .nav-menu li{border-bottom:1px solid rgba(255,255,255,0.06);}
      .nav-menu a{display:block;padding:0.85rem 0;font-size:0.85rem;letter-spacing:2px;color:var(--text);}
      .nav-menu a:hover{color:var(--amber);}

      .terminal-main { padding: 6.25rem 0.75rem 2rem; }
      .terminal-shell {
        width: calc(100vw - 1.5rem);
        height: min(560px, calc(100vh - 8.25rem));
        min-height: 360px;
      }
      .terminal-output,
      .terminal-input-row { font-size: 0.72rem; }
      .terminal-input-row {
        align-items: flex-start;
        flex-wrap: wrap;
        gap: 0.35rem;
      }
      .terminal-titlebar { cursor: default; }
    }
  </style>
</head>
<body>

  <header id="site-header">
    <nav>
      <a href="index.html" class="logo">PHISHERS_OF_MEN</a>
      <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false" aria-controls="nav-menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-menu" id="nav-menu">
        <li><a href="index.html">HOME</a></li>
        <li><a href="projects.html">PROJECTS</a></li>
        <li><a href="terminal.html">TERMINAL</a></li>
        <li><a href="index.html#team">TEAM</a></li>
        <li><a href="index.html#contact">CONTACT</a></li>
        <li><a href="phishstral.html">PHISHSTRAL</a></li>
      </ul>
    </nav>
  </header>

  <main class="terminal-main">
    <section class="terminal-shell" aria-label="Linux terminal simulator" id="terminal-shell">
      <div class="terminal-titlebar" aria-hidden="true">
        <span class="terminal-dot"></span>
        <span class="terminal-dot"></span>
        <span class="terminal-dot"></span>
        <span class="terminal-title">guest@phishersofmen.net</span>
      </div>
      <div class="terminal-screen" id="terminal-screen">
        <div class="terminal-output" id="terminal-output" aria-live="polite"></div>
        <form class="terminal-input-row" id="terminal-form">
          <span class="terminal-prompt" id="terminal-prompt"></span>
          <input id="terminal-input" autocomplete="off" spellcheck="false" autofocus />
        </form>
      </div>
      <audio id="terminal-audio" src="/audio/music.mp3" loop preload="none"></audio>
    </section>
  </main>

  <script>
    /* ── Header scroll ── */
    const hdr = document.getElementById('site-header');
    window.addEventListener('scroll', () => hdr?.classList.toggle('is-scrolled', window.scrollY > 16), { passive: true });

    /* ── Inline data (replaces Astro frontmatter imports) ── */
    const team = [];     // populate from your team.js data if needed
    const blogs = [];    // populated from /src/content/blogs at build time in Astro
    const projects = []; // populated from /src/projects at build time in Astro

    /* ── Terminal logic ── */
    const ROOT = "/phishersofmen.net";
    const output = document.getElementById("terminal-output");
    const screen = document.getElementById("terminal-screen");
    const form   = document.getElementById("terminal-form");
    const input  = document.getElementById("terminal-input");
    const prompt = document.getElementById("terminal-prompt");
    const shell  = document.getElementById("terminal-shell");
    const audio  = document.getElementById("terminal-audio");
    const history = [];
    let historyIndex = 0;
    let cwd = ROOT;
    let nanoFile = null;
    let nanoText = "";

    const secrets = {
      [`${ROOT}/etc/motd`]: "phishersofmen.net shell",
      [`${ROOT}/home/guest/notes.txt`]: "Recon notes:\n- robots.txt is usually boring.\n- The lab subnet is 192.168.56.0/24.",
      [`${ROOT}/home/guest/.ssh/id_rsa`]: "cat: id_rsa: Permission denied",
      [`${ROOT}/var/www/html/robots.txt`]: "User-agent: *\nDisallow: /secret-stuff\n",
      [`${ROOT}/var/log/auth.log`]: "May 11 09:31:44 Attempted login from 192.168.56.23",
      [`${ROOT}/opt/lan/README`]: "LAN...",
      [`${ROOT}/opt/lan/.flag-hint`]: "No hints for you.",
    };

    const hosts = [
      {
        ip: "192.168.56.10",
        name: "web-cache.local",
        ports: ["22/tcp open ssh OpenSSH_9.3", "80/tcp open http nginx/1.24", "8080/tcp filtered http-proxy"],
        page: "HTTP/1.1 200 OK\nServer: nginx/1.24\n\nweb-cache.local: static mirror.",
      },
      {
        ip: "192.168.56.23",
        name: "workbench.local",
        ports: ["22/tcp open ssh Dropbear", "139/tcp open netbios-ssn Samba", "445/tcp open microsoft-ds Samba"],
        page: "No HTTP service here.",
      },
      {
        ip: "192.168.56.44",
        name: "printer.local",
        ports: ["9100/tcp open jetdirect", "631/tcp open ipp CUPS"],
        page: "IPP/2.0 200 OK",
      },
    ];

    function displayPath() {
      if (cwd === ROOT) return "/";
      return cwd.replace(ROOT, "") || "/";
    }

    function syncPrompt() {
      prompt.textContent = `guest@phishersofmen.net:${displayPath()}$`;
    }

    function line(text = "", className = "") {
      const div = document.createElement("div");
      div.className = `term-line ${className}`;
      div.textContent = text;
      output.appendChild(div);
      screen.scrollTop = screen.scrollHeight;
    }

    function block(text, className = "") {
      String(text).split("\n").forEach((row) => line(row, className));
    }

    function normalize(path) {
      if (!path || path === ".") return cwd;
      if (path === "/" || path === ROOT) return ROOT;
      const base = path.startsWith(`${ROOT}/`)
        ? path
        : path.startsWith("/")
          ? `${ROOT}${path}`
          : `${cwd}/${path}`;
      const rel = base.replace(ROOT, "").split("/");
      const stack = [];
      for (const part of rel) {
        if (!part || part === ".") continue;
        if (part === "..") stack.pop();
        else stack.push(part);
      }
      return `${ROOT}${stack.length ? `/${stack.join("/")}` : ""}`;
    }

    function projectText(project) {
      return `${project.title} (${project.year}, ${project.status})\n${project.summary}\n\n${project.body}`;
    }

    function blogText(blog) {
      return `${blog.title}\n${blog.date} - ${blog.author}\n${blog.excerpt}\n\n${blog.body}`;
    }

    function teamText(member) {
      return `${member.name}\n${member.role}\n${member.bio}\n\nSpecialties: ${member.specialties.join(", ")}\nGitHub: ${member.github}`;
    }

    function filesFor(path) {
      if (path === ROOT) return ["blog", "etc", "home", "opt", "projects", "team", "var"];
      if (path === `${ROOT}/home`) return ["guest"];
      if (path === `${ROOT}/home/guest`) return ["notes.txt", ".ssh"];
      if (path === `${ROOT}/home/guest/.ssh`) return ["id_rsa"];
      if (path === `${ROOT}/etc`) return ["motd"];
      if (path === `${ROOT}/var`) return ["log", "www"];
      if (path === `${ROOT}/var/www`) return ["html"];
      if (path === `${ROOT}/var/www/html`) return ["robots.txt"];
      if (path === `${ROOT}/var/log`) return ["auth.log"];
      if (path === `${ROOT}/opt`) return ["lan"];
      if (path === `${ROOT}/opt/lan`) return ["README", ".flag-hint"];
      if (path === `${ROOT}/projects`) return projects.map((p) => `${p.slug}.md`);
      if (path === `${ROOT}/blog`) return blogs.map((b) => `${b.slug}.md`);
      if (path === `${ROOT}/team`) return team.map((m) => `${m.name.toLowerCase()}.bio`);
      return null;
    }

    function readFile(path) {
      const full = normalize(path);
      if (secrets[full]) return secrets[full];
      if (full.startsWith(`${ROOT}/projects/`)) {
        const slug = full.split("/").pop().replace(".md", "");
        const project = projects.find((item) => item.slug === slug);
        if (project) return projectText(project);
      }
      if (full.startsWith(`${ROOT}/blog/`)) {
        const slug = full.split("/").pop().replace(".md", "");
        const blog = blogs.find((item) => item.slug === slug);
        if (blog) return blogText(blog);
      }
      if (full.startsWith(`${ROOT}/team/`)) {
        const slug = full.split("/").pop().replace(".bio", "");
        const member = team.find((item) => item.name.toLowerCase() === slug);
        if (member) return teamText(member);
      }
      return localStorage.getItem(`pom-nano:${full}`);
    }

    function help() {
      return [
        "help                  show this command list",
        "clear                 clear terminal output",
        "pwd                   print working directory",
        "ls [-la] [path]       list files",
        "cd [path]             change directory",
        "cat <file>            print file",
        "less <file>           print file",
        "grep <term> <file>    search a file",
        "find [path]           list known files below a path",
        "tree [path]           show one directory level",
        "whoami                print current user",
        "uname -a              print kernel info",
        "date                  print current date",
        "history               print command history",
        "echo <text>           print text",
        "curl <url>            request a URL",
        "nmap <target>         scan a target",
        "ping <host>           send ICMP packets",
        "nano <file>           open a text file",
        "save                  save the nano file",
        "exit                  close nano or logout",
        "music                 play or pause music",
        "open <page>           open pages",
      ].join("\n");
    }

    async function toggleMusic() {
      if (!audio.paused) {
        audio.pause();
        line("[1]+  Stopped                 /audio/music.mp3", "term-muted");
        return;
      }
      try {
        await audio.play();
        line("[1]  Playing                 /audio/music.mp3", "term-muted");
      } catch {
        line("music: unable to play /audio/music.mp3");
      }
    }

    function runCommand(raw) {
      const command = raw.replace(/\s+$/, "");
      if (!command.trim()) return;
      history.push(command);
      historyIndex = history.length;
      line(`${prompt.textContent} ${command}`, "term-command");

      if (nanoFile && command !== "save" && command !== "exit") {
        nanoText += `${command}\n`;
        return;
      }

      const [cmd, ...args] = command.trim().split(/\s+/);
      const rest = command.trim().slice(cmd.length).trim();

      if (cmd === "help" || cmd === "man") block(help());
      else if (cmd === "clear") output.innerHTML = "";
      else if (cmd === "pwd") line(cwd);
      else if (cmd === "whoami") line("guest");
      else if (cmd === "uname") line("Linux phishersofmen.net 6.8.0-pom #1 SMP PREEMPT_DYNAMIC x86_64 GNU/Linux");
      else if (cmd === "date") line(new Date().toString());
      else if (cmd === "history") history.forEach((item, index) => line(`${String(index + 1).padStart(3, " ")}  ${item}`));
      else if (cmd === "echo") line(rest);
      else if (cmd === "music") toggleMusic();
      else if (cmd === "open") {
        const page = args[0] || "/";
        const map = { home: "/", blog: "/blog", projects: "/projects", terminal: "/terminal", secret: "/secret-stuff" };
        window.location.href = map[page] || page;
      }
      else if (cmd === "cd") {
        const next = normalize(args[0] || ROOT);
        if (filesFor(next)) cwd = next;
        else line(`cd: ${args[0]}: No such directory`);
      }
      else if (cmd === "ls") {
        const target = args.find((arg) => !arg.startsWith("-")) || cwd;
        const files = filesFor(normalize(target));
        if (!files) line(`ls: cannot access '${target}': No such directory`);
        else line(files.join(args.includes("-la") || args.includes("-al") ? "\n" : "  "));
      }
      else if (cmd === "cat" || cmd === "less") {
        const text = readFile(args[0]);
        if (text) block(text);
        else line(`${cmd}: ${args[0] || ""}: No such file`);
      }
      else if (cmd === "grep") {
        const [term, file] = args;
        const text = readFile(file);
        if (!term || !file) line("usage: grep <term> <file>");
        else if (!text) line(`grep: ${file}: No such file`);
        else block(text.split("\n").filter((row) => row.toLowerCase().includes(term.toLowerCase())).join("\n"));
      }
      else if (cmd === "find") {
        const target = normalize(args[0] || ROOT);
        const roots = [
          target,
          `${ROOT}/projects`,
          `${ROOT}/blog`,
          `${ROOT}/team`,
          `${ROOT}/etc`,
          `${ROOT}/opt/lan`,
          `${ROOT}/var/log`,
          `${ROOT}/var/www/html`,
        ].filter((item, index, arr) => arr.indexOf(item) === index);
        roots.forEach((root) => {
          const files = filesFor(root);
          if (files) files.forEach((file) => line(`${root}/${file}`));
        });
      }
      else if (cmd === "tree") {
        const target = normalize(args[0] || cwd);
        const files = filesFor(target);
        if (!files) line(`tree: ${target}: No such directory`);
        else {
          line(target);
          files.forEach((file, index) => line(`${index === files.length - 1 ? "`--" : "|--"} ${file}`));
        }
      }
      else if (cmd === "curl") {
        const url = args[0] || "";
        if (url.includes("robots.txt")) block("User-agent: *\nDisallow: /secret-stuff");
        else if (url.includes("192.168.56.10")) block(hosts[0].page);
        else if (url.includes("/api/projects")) block(JSON.stringify(projects.map(({ title, status, year }) => ({ title, status, year })), null, 2));
        else if (url === "/" || url.includes("phishers")) line("<html><title>PHISHERS OF MEN</title><body></body></html>");
        else line("curl: Could not resolve host or no response for that URL");
      }
      else if (cmd === "nmap") {
        const target = args[0] || "";
        if (!target) line("usage: nmap <target>");
        else if (target === "192.168.56.0/24" || target === "-sV") {
          block(`Starting Nmap lab scan\n${hosts.map((host) => `Nmap scan report for ${host.name} (${host.ip})\n${host.ports.join("\n")}`).join("\n\n")}\nNmap done: 256 IP addresses (3 hosts up) scanned in 2.41 seconds`);
        } else {
          const host = hosts.find((item) => item.ip === target || item.name === target);
          block(host ? `Nmap scan report for ${host.name} (${host.ip})\n${host.ports.join("\n")}` : `Host ${target} appears down in this lab.`);
        }
      }
      else if (cmd === "ping") {
        const host = hosts.find((item) => item.ip === args[0] || item.name === args[0]);
        block(host
          ? `PING ${host.name} (${host.ip})\n64 bytes from ${host.ip}: icmp_seq=1 ttl=64 time=0.42 ms\n64 bytes from ${host.ip}: icmp_seq=2 ttl=64 time=0.39 ms`
          : `ping: ${args[0] || ""}: Name or service not known`);
      }
      else if (cmd === "nano") {
        nanoFile = normalize(args[0] || "draft.txt");
        nanoText = readFile(nanoFile) || "";
        block(`GNU nano 7.2  ${nanoFile}\n${nanoText}`);
      }
      else if (cmd === "save") {
        if (!nanoFile) line("save: no nano buffer open");
        else {
          localStorage.setItem(`pom-nano:${nanoFile}`, nanoText);
          line(`[ Wrote ${nanoFile} ]`);
        }
      }
      else if (cmd === "exit") {
        if (nanoFile) {
          nanoFile = null;
          nanoText = "";
        } else line("logout");
      }
      else line(`${cmd}: command not found`);

      syncPrompt();
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      runCommand(input.value);
      input.value = "";
    });

    input.addEventListener("keydown", (event) => {
      if (event.key === " ") {
        event.stopPropagation();
      }
      if (event.key === "ArrowUp") {
        event.preventDefault();
        historyIndex = Math.max(0, historyIndex - 1);
        input.value = history[historyIndex] || "";
      }
      if (event.key === "ArrowDown") {
        event.preventDefault();
        historyIndex = Math.min(history.length, historyIndex + 1);
        input.value = history[historyIndex] || "";
      }
    });

    /* ── Hamburger menu ── */
    (function(){
      const btn=document.getElementById('hamburger'),menu=document.getElementById('nav-menu');
      if(!btn||!menu)return;
      btn.addEventListener('click',()=>{const open=menu.classList.toggle('is-open');btn.setAttribute('aria-expanded',open);});
      menu.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>{menu.classList.remove('is-open');btn.setAttribute('aria-expanded','false');}));
      document.addEventListener('click',e=>{if(!btn.contains(e.target)&&!menu.contains(e.target)){menu.classList.remove('is-open');btn.setAttribute('aria-expanded','false');}});
    })();

    shell.addEventListener("click", () => input.focus());
    shell.addEventListener("wheel", (event) => event.stopPropagation(), { passive: true });
    syncPrompt();
  </script>
</body>
</html>
