<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PHISHSTRAL</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syne:wght@700;800&family=Fragment+Mono&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --surface2: #1c2128;
      --border: rgba(255,255,255,0.06); --amber: #00ff00; --slate: #8b95a1; --text: #cdd5df;
      --f-head: 'Syne', sans-serif; --f-body: 'Space Grotesk', sans-serif; --f-mono: 'Fragment Mono', monospace;
      --sidebar-w: 260px; --header-h: 57px;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: var(--f-body); line-height: 1.6; overflow-x: hidden; }
    body::before { content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none; background: linear-gradient(90deg,rgba(0,255,0,0.03) 1px,transparent 1px),linear-gradient(0deg,rgba(205,213,223,0.02) 1px,transparent 1px); background-size: 72px 72px; mask-image: linear-gradient(to bottom,rgba(0,0,0,0.7),transparent 60%); }
    ::selection { background: rgba(0,255,0,0.28); color: #fff; }

    /* ── HEADER ── */
    header { position: fixed; top: 0; left: 0; right: 0; height: var(--header-h); padding: 0 2rem; backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); z-index: 200; display: flex; align-items: center; transition: background 0.25s, border-color 0.25s; }
    nav { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 1400px; margin: auto; }
    .logo { font-family: var(--f-head); color: var(--amber); text-decoration: none; font-weight: 800; letter-spacing: 2px; font-size: 0.95rem; }
    nav ul { display: flex; gap: 1.25rem; list-style: none; }
    nav a { color: var(--slate); text-decoration: none; font-size: .8rem; transition: color 0.2s; }
    nav a:hover, nav a.active { color: var(--amber); }
    header.is-scrolled { background: rgba(13,17,23,0.85); border-color: rgba(0,255,0,0.15); }
    .hamburger { display: none; flex-direction: column; justify-content: center; gap: 5px; width: 32px; height: 32px; background: none; border: none; cursor: pointer; padding: 4px; z-index: 300; }
    .hamburger span { display: block; width: 100%; height: 2px; background: var(--amber); border-radius: 2px; transition: transform 0.28s, opacity 0.28s; transform-origin: center; }
    .hamburger[aria-expanded="true"] span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger[aria-expanded="true"] span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger[aria-expanded="true"] span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .nav-menu { display: flex; gap: 1.25rem; list-style: none; }

    /* ── AUTH SCREEN ── */
    #auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 6rem 1.5rem 3rem; }
    .auth-card { position: relative; width: min(440px,100%); background: rgba(22,27,34,0.92); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 2.5rem 2.2rem; box-shadow: 0 24px 80px rgba(0,0,0,0.55); overflow: hidden; animation: fadeUp 0.6s ease both; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    .auth-card::before { content:''; position:absolute; inset:-1px; border-radius:8px; padding:1px; background:linear-gradient(135deg,rgba(0,255,0,0) 0%,rgba(0,255,0,0.4) 50%,rgba(0,255,0,0) 100%); -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0); -webkit-mask-composite:xor; mask-composite:exclude; opacity:0.6; pointer-events:none; }
    .auth-scanlines { position:absolute; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.08) 3px,rgba(0,0,0,0.08) 4px); pointer-events:none; border-radius:8px; }
    .auth-badge { font-family:var(--f-mono); font-size:0.6rem; color:var(--amber); letter-spacing:3px; opacity:0.55; margin-bottom:0.5rem; display:block; }
    .auth-title { font-family:var(--f-head); font-size:clamp(2rem,6vw,2.6rem); color:var(--amber); letter-spacing:2px; line-height:1; }
    .auth-subtitle { font-family:var(--f-mono); font-size:0.72rem; color:var(--slate); letter-spacing:1px; margin-top:0.4rem; margin-bottom:2rem; }
    .auth-tabs { display:flex; border-bottom:1px solid var(--border); margin-bottom:1.8rem; }
    .auth-tab { background:none; border:none; color:var(--slate); font-family:var(--f-mono); font-size:0.7rem; letter-spacing:2px; padding:0.55rem 1.2rem 0.55rem 0; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:color 0.2s,border-color 0.2s; }
    .auth-tab.active { color:var(--amber); border-bottom-color:var(--amber); }
    .auth-tab:hover:not(.active) { color:var(--text); }
    .auth-form { display:none; }
    .auth-form.active { display:block; }
    .form-group { margin-bottom:1rem; }
    label { font-size:0.65rem; color:var(--amber); font-family:var(--f-mono); letter-spacing:2px; display:block; margin-bottom:0.28rem; }
    input[type="email"], input[type="password"] { width:100%; padding:0.68rem 0.9rem; background:rgba(11,15,20,0.85); border:1px solid var(--border); color:var(--text); border-radius:6px; font-family:var(--f-body); font-size:0.9rem; transition:border-color 0.2s,box-shadow 0.2s; outline:none; }
    input:focus { border-color:rgba(0,255,0,0.55); box-shadow:0 0 0 3px rgba(0,255,0,0.1); }
    input::placeholder { color:rgba(139,149,161,0.45); }
    .btn-primary { width:100%; padding:0.85rem 2rem; background:var(--amber); color:#000; border:none; border-radius:6px; font-family:var(--f-body); font-weight:700; font-size:0.8rem; letter-spacing:2px; cursor:pointer; margin-top:0.4rem; transition:opacity 0.2s,transform 0.1s; }
    .btn-primary:hover { opacity:0.88; transform:translateY(-1px); }
    .btn-primary:active { transform:translateY(1px); }
    .btn-primary:disabled { opacity:0.45; cursor:not-allowed; transform:none; }
    .auth-msg { display:none; margin-top:1.1rem; padding:0.7rem 1rem; border-radius:5px; font-size:0.8rem; font-family:var(--f-mono); }
    .auth-msg.error { background:rgba(255,80,80,0.1); border:1px solid rgba(255,80,80,0.3); color:#ff8a80; display:block; }
    .auth-msg.success { background:rgba(0,255,0,0.07); border:1px solid rgba(0,255,0,0.3); color:var(--amber); display:block; }

    /* ── CHAT LAYOUT ── */
    #chat-screen { display: none; height: 100vh; padding-top: var(--header-h); }
    #chat-screen.visible { display: flex; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w); flex-shrink: 0; height: 100%;
      background: rgba(13,17,23,0.95); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
      transition: transform 0.3s ease;
    }
    .sidebar-top { padding: 0.85rem 0.85rem 0.6rem; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .btn-new-chat {
      width: 100%; padding: 0.65rem 1rem; background: rgba(0,255,0,0.1);
      border: 1px solid rgba(0,255,0,0.3); border-radius: 6px;
      color: var(--amber); font-family: var(--f-mono); font-size: 0.7rem;
      letter-spacing: 2px; cursor: pointer; display: flex; align-items: center;
      gap: 0.5rem; transition: background 0.2s, border-color 0.2s;
    }
    .btn-new-chat:hover { background: rgba(0,255,0,0.18); border-color: rgba(0,255,0,0.55); }
    .sidebar-label { font-family: var(--f-mono); font-size: 0.58rem; color: var(--slate); letter-spacing: 3px; padding: 0.75rem 0.85rem 0.35rem; opacity: 0.6; }
    .chat-list { flex: 1; overflow-y: auto; padding: 0 0.5rem 1rem; }
    .chat-list::-webkit-scrollbar { width: 3px; }
    .chat-list::-webkit-scrollbar-thumb { background: rgba(0,255,0,0.15); border-radius: 2px; }
    .chat-item {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.6rem 0.75rem; border-radius: 6px; cursor: pointer;
      transition: background 0.15s; margin-bottom: 2px; group: true;
    }
    .chat-item:hover { background: rgba(255,255,255,0.05); }
    .chat-item.active { background: rgba(0,255,0,0.08); border: 1px solid rgba(0,255,0,0.2); }
    .chat-item-icon { color: var(--slate); opacity: 0.5; flex-shrink: 0; }
    .chat-item.active .chat-item-icon { color: var(--amber); opacity: 0.8; }
    .chat-item-title { flex: 1; font-size: 0.8rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-item.active .chat-item-title { color: var(--amber); }
    .chat-item-del {
      opacity: 0; background: none; border: none; color: var(--slate);
      cursor: pointer; padding: 2px 4px; border-radius: 3px; font-size: 0.75rem;
      transition: opacity 0.15s, color 0.15s; flex-shrink: 0;
    }
    .chat-item:hover .chat-item-del { opacity: 1; }
    .chat-item-del:hover { color: #ff8a80; }
    .sidebar-bottom { padding: 0.75rem; border-top: 1px solid var(--border); flex-shrink: 0; }
    .user-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.5rem; }
    .user-avatar { width: 28px; height: 28px; border-radius: 6px; background: rgba(0,255,0,0.12); border: 1px solid rgba(0,255,0,0.25); display: flex; align-items: center; justify-content: center; font-family: var(--f-mono); font-size: 0.55rem; color: var(--amber); flex-shrink: 0; }
    .user-info { flex: 1; min-width: 0; }
    .user-email-small { font-family: var(--f-mono); font-size: 0.62rem; color: var(--slate); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .credits-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; }
    .credits-pill { display: flex; align-items: center; gap: 0.35rem; background: rgba(0,255,0,0.07); border: 1px solid rgba(0,255,0,0.2); border-radius: 20px; padding: 0.25rem 0.65rem; font-family: var(--f-mono); font-size: 0.65rem; color: var(--amber); }
    .btn-buy { background: transparent; border: 1px solid rgba(0,255,0,0.25); color: var(--amber); font-family: var(--f-mono); font-size: 0.6rem; letter-spacing: 1px; padding: 0.25rem 0.6rem; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
    .btn-buy:hover { background: rgba(0,255,0,0.08); }
    .btn-signout { width: 100%; padding: 0.5rem; background: transparent; border: 1px solid rgba(255,255,255,0.08); color: var(--slate); font-family: var(--f-mono); font-size: 0.62rem; letter-spacing: 2px; border-radius: 5px; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
    .btn-signout:hover { border-color: rgba(255,100,100,0.4); color: #ff8a80; }

    /* ── MAIN CHAT AREA ── */
    .chat-main { flex: 1; display: flex; flex-direction: column; min-width: 0; height: 100%; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1.25rem; scroll-behavior: smooth; }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(0,255,0,0.15); border-radius: 2px; }

    /* Empty state */
    .chat-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem; pointer-events: none; }
    .chat-empty-title { font-family: var(--f-head); font-size: clamp(1.8rem,5vw,2.8rem); color: var(--amber); letter-spacing: 4px; opacity: 0.25; }
    .chat-empty-sub { font-family: var(--f-mono); font-size: 0.7rem; color: var(--slate); opacity: 0.35; }

    /* Messages */
    .msg { display: flex; gap: 0.85rem; max-width: 820px; width: 100%; animation: msgIn 0.25s ease both; }
    @keyframes msgIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .msg.user { flex-direction: row-reverse; align-self: flex-end; }
    .msg.assistant { align-self: flex-start; }
    .msg-avatar { width:32px; height:32px; border-radius:6px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-family:var(--f-mono); font-size:0.58rem; font-weight:700; letter-spacing:1px; }
    .msg.user .msg-avatar { background:rgba(0,255,0,0.15); border:1px solid rgba(0,255,0,0.3); color:var(--amber); }
    .msg.assistant .msg-avatar { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:var(--slate); }
    .msg-bubble { padding:0.85rem 1.1rem; border-radius:8px; max-width:calc(100% - 50px); font-size:0.92rem; line-height:1.7; }
    .msg.user .msg-bubble { background:rgba(0,255,0,0.09); border:1px solid rgba(0,255,0,0.2); color:var(--text); border-bottom-right-radius:2px; }
    .msg.assistant .msg-bubble { background:rgba(22,27,34,0.9); border:1px solid rgba(255,255,255,0.07); color:var(--text); border-bottom-left-radius:2px; }
    .msg.assistant .msg-bubble h1,.msg.assistant .msg-bubble h2,.msg.assistant .msg-bubble h3 { font-family:var(--f-head); color:var(--amber); margin:1rem 0 0.4rem; letter-spacing:1px; }
    .msg.assistant .msg-bubble h1 { font-size:1.2rem; } .msg.assistant .msg-bubble h2 { font-size:1rem; } .msg.assistant .msg-bubble h3 { font-size:0.9rem; }
    .msg.assistant .msg-bubble p { margin-bottom:0.6rem; } .msg.assistant .msg-bubble p:last-child { margin-bottom:0; }
    .msg.assistant .msg-bubble ul,.msg.assistant .msg-bubble ol { padding-left:1.4rem; margin-bottom:0.6rem; }
    .msg.assistant .msg-bubble code { font-family:var(--f-mono); font-size:0.82rem; background:rgba(0,255,0,0.08); border:1px solid rgba(0,255,0,0.15); padding:0.1rem 0.35rem; border-radius:3px; color:var(--amber); }
    .msg.assistant .msg-bubble pre { background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.08); border-radius:6px; padding:1rem; overflow-x:auto; margin:0.6rem 0; }
    .msg.assistant .msg-bubble pre code { background:none; border:none; padding:0; color:inherit; font-size:0.82rem; border-radius:0; }
    .msg.assistant .msg-bubble blockquote { border-left:3px solid rgba(0,255,0,0.4); padding-left:1rem; color:var(--slate); margin:0.6rem 0; font-style:italic; }
    .msg.assistant .msg-bubble a { color:var(--amber); }
    .msg.assistant .msg-bubble table { border-collapse:collapse; width:100%; margin:0.6rem 0; font-size:0.85rem; }
    .msg.assistant .msg-bubble th,.msg.assistant .msg-bubble td { border:1px solid rgba(255,255,255,0.1); padding:0.4rem 0.7rem; text-align:left; }
    .msg.assistant .msg-bubble th { background:rgba(0,255,0,0.07); color:var(--amber); font-family:var(--f-mono); font-size:0.75rem; letter-spacing:1px; }

    /* Typing indicator */
    .typing-indicator { display:flex; gap:4px; align-items:center; padding:0.4rem 0; }
    .typing-indicator span { width:6px; height:6px; border-radius:50%; background:var(--amber); opacity:0.4; animation:typingBounce 1.2s ease infinite; }
    .typing-indicator span:nth-child(2) { animation-delay:0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay:0.4s; }
    @keyframes typingBounce { 0%,60%,100% { opacity:0.25; transform:translateY(0); } 30% { opacity:0.9; transform:translateY(-4px); } }

    /* Input area */
    .chat-input-area { padding: 1rem 1.5rem 1.25rem; background: rgba(13,17,23,0.95); border-top: 1px solid var(--border); flex-shrink: 0; }
    .chat-input-wrap { display:flex; gap:0.75rem; align-items:flex-end; max-width:820px; margin:auto; background:rgba(22,27,34,0.9); border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:0.5rem 0.5rem 0.5rem 1rem; transition:border-color 0.2s,box-shadow 0.2s; }
    .chat-input-wrap:focus-within { border-color:rgba(0,255,0,0.4); box-shadow:0 0 0 3px rgba(0,255,0,0.07); }
    #chat-input { flex:1; background:none; border:none; outline:none; color:var(--text); font-family:var(--f-body); font-size:0.92rem; line-height:1.5; resize:none; max-height:180px; min-height:24px; padding:0.35rem 0; }
    #chat-input::placeholder { color:rgba(139,149,161,0.4); }
    .btn-send { width:36px; height:36px; flex-shrink:0; border-radius:7px; background:var(--amber); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:opacity 0.2s,transform 0.1s; }
    .btn-send:hover { opacity:0.85; transform:scale(1.05); }
    .btn-send:active { transform:scale(0.95); }
    .btn-send:disabled { opacity:0.3; cursor:not-allowed; transform:none; }
    .chat-hint { text-align:center; font-family:var(--f-mono); font-size:0.6rem; color:rgba(139,149,161,0.3); margin-top:0.5rem; }

    /* Sidebar toggle for mobile */
    .btn-sidebar-toggle { display: none; background: none; border: none; color: var(--slate); cursor: pointer; padding: 4px; margin-right: 0.5rem; }

    /* ── NO CREDITS MODAL ── */
    #no-credits-modal { display:none; position:fixed; inset:0; z-index:400; background:rgba(0,0,0,0.75); backdrop-filter:blur(6px); align-items:center; justify-content:center; padding:1.5rem; }
    #no-credits-modal.visible { display:flex; }
    .modal-card { background:rgba(22,27,34,0.98); border:1px solid rgba(0,255,0,0.3); border-radius:10px; padding:2.5rem 2rem; max-width:400px; width:100%; text-align:center; box-shadow:0 0 80px rgba(0,255,0,0.08); animation:fadeUp 0.3s ease both; }
    .modal-icon { font-size:2.5rem; margin-bottom:1rem; }
    .modal-title { font-family:var(--f-head); font-size:1.5rem; color:var(--amber); letter-spacing:2px; margin-bottom:0.5rem; }
    .modal-body { font-family:var(--f-mono); font-size:0.75rem; color:var(--slate); line-height:1.7; margin-bottom:1.5rem; }
    .modal-body a { color:var(--amber); }
    .modal-close { background:transparent; border:1px solid rgba(255,255,255,0.15); color:var(--slate); font-family:var(--f-mono); font-size:0.65rem; letter-spacing:2px; padding:0.5rem 1.2rem; border-radius:4px; cursor:pointer; transition:border-color 0.2s; }
    .modal-close:hover { border-color:rgba(255,255,255,0.35); }

    /* ── RESPONSIVE ── */
    @media (max-width: 760px) {
      .hamburger { display: flex; }
      .nav-menu { display:none; flex-direction:column; position:fixed; top:0; right:0; width:220px; height:100vh; background:rgba(13,17,23,0.97); border-left:1px solid rgba(0,255,0,0.18); padding:5rem 1.5rem 2rem; gap:0; z-index:250; backdrop-filter:blur(14px); }
      .nav-menu.is-open { display:flex; }
      .nav-menu li { border-bottom:1px solid rgba(255,255,255,0.06); }
      .nav-menu a { display:block; padding:0.85rem 0; font-size:0.85rem; letter-spacing:2px; color:var(--text); }
      .btn-sidebar-toggle { display: flex; }
      .sidebar { position: fixed; left: 0; top: var(--header-h); bottom: 0; z-index: 150; transform: translateX(-100%); width: min(var(--sidebar-w), 85vw); }
      .sidebar.is-open { transform: translateX(0); }
      .sidebar-backdrop { display: none; position: fixed; inset: 0; z-index: 140; background: rgba(0,0,0,0.5); }
      .sidebar-backdrop.visible { display: block; }
      .auth-card { padding: 1.8rem 1.4rem; }
      .chat-messages { padding: 1rem 0.85rem; }
      .chat-input-area { padding: 0.75rem 0.85rem 1rem; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header id="site-header">
    <nav>
      <a href="index.html" class="logo">PHISHERS_OF_MEN</a>
      <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-menu" id="nav-menu">
        <li><a href="index.html">HOME</a></li>
        <li><a href="projects.html">PROJECTS</a></li>
        <li><a href="terminal.html">TERMINAL</a></li>
        <li><a href="index.html#team">TEAM</a></li>
        <li><a href="index.html#contact">CONTACT</a></li>
        <li><a href="phishstral.html">PHISHSTRAL</a></li>
      </ul>
    </nav>
  </header>

  <!-- AUTH SCREEN -->
  <div id="auth-screen">
    <div class="auth-card">
      <div class="auth-scanlines"></div>
      <span class="auth-badge">SECURE ACCESS</span>
      <h1 class="auth-title">PHISHSTRAL</h1>
      <p class="auth-subtitle">Phishstral is not avaliable at this time.</p>
    </div>
  </div>

  <script>
    (function () {
      const btn = document.getElementById('hamburger');
      const menu = document.getElementById('nav-menu');
      if (!btn || !menu) return;

      btn.addEventListener('click', () => {
        const open = menu.classList.toggle('is-open');
        btn.setAttribute('aria-expanded', open);
      });

      // Close when a nav link is clicked
      menu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
        menu.classList.remove('is-open');
        btn.setAttribute('aria-expanded', 'false');
      }));

      // Close when clicking outside
      document.addEventListener('click', e => {
        if (!btn.contains(e.target) && !menu.contains(e.target)) {
          menu.classList.remove('is-open');
          btn.setAttribute('aria-expanded', 'false');
        }
      });
    })();
  </script>
</body>
</html>
